<text x="286" y="282" fill="#1c1f2a" font-size="16" font-weight="500">1: Restore</text><text x="286" y="303" fill="#1c1f2a" font-size="16" font-weight="500">auxiliary</text><text x="286" y="324" fill="#1c1f2a" font-size="16" font-weight="500">power</text>
