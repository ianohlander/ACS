<text x="98" y="475" fill="#1c1f2a" font-size="15" font-weight="500">Every stage has a visible</text><text x="98" y="495" fill="#1c1f2a" font-size="15" font-weight="500">in-world reason.</text><rect x="80" y="507" width="328" height="70" rx="14" fill="#fff9e8" stroke="#d7ceb0" stroke-width="2"/>
<text x="98" y="535" fill="#d49a38" font-size="14" font-weight="800">Note 2</text>
<text x="98" y="561" fill="#1c1f2a" font-size="15" font-weight="500">Avoid duplicate objectives by</text><text x="98" y="581" fill="#1c1f2a" font-size="15" font-weight="500">reusing the quest object.</text>
