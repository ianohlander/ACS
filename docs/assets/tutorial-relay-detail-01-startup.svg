<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Step 1 - Open The Editor</title>
  <desc id="desc">Run the web server, then start in editor.html.</desc>
  <rect width="1100" height="700" fill="#efe4c8"/>
  <rect x="24" y="24" width="1052" height="652" rx="28" fill="#f7f2df" stroke="#3c465c" stroke-width="4"/>
  <text x="58" y="76" fill="#1c1f2a" font-size="34" font-weight="800">Step 1 - Open The Editor</text>
  <text x="60" y="110" fill="#5d6376" font-size="18" font-weight="500">Run the web server, then start in editor.html.</text>
  <rect x="70" y="150" width="550" height="330" rx="18" fill="#fffdf3" stroke="#3c465c" stroke-width="3"/>
<text x="94" y="166" fill="#5d6376" font-size="18" font-weight="700">Terminal and browser route</text>
<rect x="92" y="180" width="470" height="48" rx="8" fill="#22283a" stroke="#3c465c"/>
<text x="116" y="211" fill="#f8f1dd" font-size="20" font-weight="700">npm run build</text><rect x="92" y="252" width="470" height="48" rx="8" fill="#22283a" stroke="#3c465c"/>
<text x="116" y="283" fill="#f8f1dd" font-size="20" font-weight="700">npm run serve:web</text><rect x="92" y="324" width="470" height="48" rx="8" fill="#e8f4f7" stroke="#3c465c"/>
<text x="116" y="355" fill="#1c1f2a" font-size="20" font-weight="700">http://localhost:4317/editor.html</text>
<rect x="92" y="410" width="470" height="42" rx="12" fill="#61a65f" opacity="0.85"/>
<text x="116" y="438" fill="#ffffff" font-size="18" font-weight="800">Editor opens to the progressive authoring flow</text>
<rect x="670" y="156" width="328" height="70" rx="14" fill="#fff9e8" stroke="#d7ceb0" stroke-width="2"/>
<text x="688" y="184" fill="#d49a38" font-size="14" font-weight="800">Note 1</text>
<text x="688" y="210" fill="#1c1f2a" font-size="15" font-weight="500">Use serve:api only when saving</text><text x="688" y="230" fill="#1c1f2a" font-size="15" font-weight="500">projects or publishing</text><text x="688" y="250" fill="#1c1f2a" font-size="15" font-weight="500">releases.</text><rect x="670" y="242" width="328" height="70" rx="14" fill="#fff9e8" stroke="#d7ceb0" stroke-width="2"/>
<text x="688" y="270" fill="#d49a38" font-size="14" font-weight="800">Note 2</text>
<text x="688" y="296" fill="#1c1f2a" font-size="15" font-weight="500">The editor and runtime are</text><text x="688" y="316" fill="#1c1f2a" font-size="15" font-weight="500">separate pages that share</text><text x="688" y="336" fill="#1c1f2a" font-size="15" font-weight="500">adventure data.</text>
</svg>