<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" viewBox="0 0 1100 700" role="img" aria-labelledby="title desc">
  <title id="title">Step 9 - Classic Dialogue Band</title>
  <desc id="desc">Dialogue should appear in the play message area for classic mode.</desc>
  <rect width="1100" height="700" fill="#efe4c8"/>
  <rect x="24" y="24" width="1052" height="652" rx="28" fill="#f7f2df" stroke="#3c465c" stroke-width="4"/>
  <text x="58" y="76" fill="#1c1f2a" font-size="34" font-weight="800">Step 9 - Classic Dialogue Band</text>
  <text x="60" y="110" fill="#5d6376" font-size="18" font-weight="500">Dialogue should appear in the play message area for classic mode.</text>
  <rect x="82" y="160" width="620" height="360" rx="20" fill="#1d2436" stroke="#3c465c" stroke-width="4"/>
<text x="110" y="210" fill="#f8e8b0" font-size="24" font-weight="800">Classic play message band</text>
<rect x="112" y="270" width="540" height="120" rx="12" fill="#101727" stroke="#6f7da0" stroke-width="2"/>
<text x="138" y="318" fill="#f7f0d5" font-size="20" font-weight="500">AI: Auxiliary power is below survival threshold.</text><text x="138" y="346" fill="#f7f0d5" font-size="20" font-weight="500">Restore the terminal, then use the transit pad.</text>
<text x="138" y="438" fill="#9eb6d8" font-size="17" font-weight="700">Use keyboard dialogue controls in classic play.</text>
<rect x="740" y="176" width="328" height="70" rx="14" fill="#fff9e8" stroke="#d7ceb0" stroke-width="2"/>
<text x="758" y="204" fill="#d49a38" font-size="14" font-weight="800">Note 1</text>
<text x="758" y="230" fill="#1c1f2a" font-size="15" font-weight="500">Use separate dialogue records</text><text x="758" y="250" fill="#1c1f2a" font-size="15" font-weight="500">for each station state.</text><rect x="740" y="262" width="328" height="70" rx="14" fill="#fff9e8" stroke="#d7ceb0" stroke-width="2"/>
<text x="758" y="290" fill="#d49a38" font-size="14" font-weight="800">Note 2</text>
<text x="758" y="316" fill="#1c1f2a" font-size="15" font-weight="500">Debug mode may show the larger</text><text x="758" y="336" fill="#1c1f2a" font-size="15" font-weight="500">panel; classic mode uses the</text><text x="758" y="356" fill="#1c1f2a" font-size="15" font-weight="500">message band.</text>
</svg>