<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220">

<defs>
  <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="17" result="noise"/>
    <feColorMatrix in="noise" type="matrix" values="0.35 0 0 0 0.55  0 0.28 0 0 0.42  0 0 0.16 0 0.16  0 0 0 0.12 0"/>
  </filter>
  <filter id="inkBleed" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="8" result="turb"/>
    <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.8"/>
  </filter>
  <filter id="softPaperShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="#4A2D18" flood-opacity="0.22"/>
  </filter>
