<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">

<defs>
  <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="17" result="noise"/>
    <feColorMatrix in="noise" type="matrix" values="0.35 0 0 0 0.55  0 0.28 0 0 0.42  0 0 0.16 0 0.16  0 0 0 0.12 0"/>
  </filter>
  <filter id="inkBleed" x="-8%" y="-8%" width="116%" height="116%">
    <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="2" seed="8" result="turb"/>
    <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.8"/>
  </filter>
  <filter id="softPaperShadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="4" dy="6" stdDeviation="5" flood-color="#4A2D18" flood-opacity="0.22"/>
  </filter>
</defs>
<rect width="1920" height="1080" fill="#D8B982"/>
<rect width="1920" height="1080" fill="#E3CC9A" opacity="0.35" filter="url(#paperNoise)"/>
<radialGradient id="v" cx="50%" cy="50%" r="76%"><stop offset="65%" stop-color="#D8B982" stop-opacity="0"/><stop offset="100%" stop-color="#4A2D18" stop-opacity="0.42"/></radialGradient><rect width="1920" height="1080" fill="url(#v)"/>
<g opacity="0.16" fill="#8B6238"><ellipse cx="260" cy="170" rx="135" ry="48" transform="rotate(-12 260 170)"/><ellipse cx="1530" cy="805" rx="210" ry="72" transform="rotate(7 1530 805)"/><circle cx="1010" cy="250" r="58" opacity="0.35"/></g>
</svg>
